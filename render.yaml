services:
  - type: web
    name: ent-solver-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: UPLOAD_SECRET
        generateValue: true
      - key: UPLOAD_SERVER_ENABLED
        value: "1"
      - key: TELEGRAM_POLLING_ENABLED
        value: "0"
      - key: GEMINI_MODEL
        value: gemini-1.5-pro
